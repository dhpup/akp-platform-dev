# One Argo CD Application per environment directory. Argo CD renders the Helm
# chart from main, combining the chart's defaults with the per-environment
# values file via the multi-source `$values` pattern. Kargo promotes by
# committing an image-tag bump to env/<stage>/values.yaml on main.
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: guestbook-helm
  namespace: argocd
spec:
  generators:
  - git:
      repoURL: https://github.com/example-org/akp-platform-dev.git
      revision: HEAD
      directories:
      - path: apps/guestbook-helm/env/*
  template:
    metadata:
      name: guestbook-helm-{{path.basename}}
      annotations:
        # Authorizes the matching Kargo Stage to manage/sync this Application.
        kargo.akuity.io/authorized-stage: guestbook-helm:{{path.basename}}
    spec:
      project: guestbook-helm
      sources:
      # Source 1: the chart, with the per-env values file pulled in from
      # source 2 (the `$values` ref) — value files outside the chart directory
      # require this multi-source pattern.
      - repoURL: https://github.com/example-org/akp-platform-dev.git
        targetRevision: HEAD
        path: apps/guestbook-helm/chart
        helm:
          valueFiles:
          - $values/apps/guestbook-helm/env/{{path.basename}}/values.yaml
      # Source 2: the same repo, exposed to source 1 as `$values`.
      - repoURL: https://github.com/example-org/akp-platform-dev.git
        targetRevision: HEAD
        ref: values
      destination:
        # The Argo CD cluster name of your workload cluster:
        name: workload-cluster
        # ...or specify a server address instead:
        # server: https://REPLACEME
        namespace: guestbook-helm-{{path.basename}}
      syncPolicy:
        syncOptions:
        - CreateNamespace=true
