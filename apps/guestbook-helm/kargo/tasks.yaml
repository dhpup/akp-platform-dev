# The "update main" promotion pattern with Helm: every promotion is a real
# commit to main that bumps image.tag in the stage's values file
# (env/<stage>/values.yaml). Argo CD renders the chart from main with that
# values file, so git history on main doubles as the deployment history.
apiVersion: kargo.akuity.io/v1alpha1
kind: PromotionTask
metadata:
  name: promote
  namespace: guestbook-helm
spec:
  vars:
  - name: repoURL
    value: https://github.com/example-org/akp-platform.git
  - name: image
    value: ghcr.io/akuity/guestbook
  steps:
  - uses: git-clone
    config:
      repoURL: ${{ vars.repoURL }}
      checkout:
      - branch: main
        path: ./src
  # Bump image.tag in the stage's values file.
  - uses: yaml-update
    as: update-values
    config:
      path: ./src/apps/guestbook-helm/env/${{ ctx.stage }}/values.yaml
      updates:
      - key: image.tag
        value: ${{ imageFrom(vars.image).Tag }}
  - uses: git-commit
    as: commit
    config:
      path: ./src
      message: "guestbook-helm/${{ ctx.stage }}: promote ${{ imageFrom(vars.image).Tag }}"
  - uses: git-push
    config:
      path: ./src
      targetBranch: main
  # Sync the Application so the bump rolls out immediately.
  - uses: argocd-update
    config:
      apps:
      - name: guestbook-helm-${{ ctx.stage }}
