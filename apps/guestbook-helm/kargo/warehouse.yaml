apiVersion: kargo.akuity.io/v1alpha1
kind: Warehouse
metadata:
  name: guestbook
  namespace: guestbook-helm
spec:
  subscriptions:
  # Image-only subscription. This variant's promotions COMMIT TO MAIN, so a
  # git subscription to main would make every promotion produce new Freight —
  # an endless loop. (The rendered variants can safely watch git because their
  # promotions push to env/* branches instead.)
  - image:
      repoURL: ghcr.io/akuity/guestbook
      imageSelectionStrategy: SemVer
      allowTags: ^v?[0-9]+\.[0-9]+\.[0-9]+([\+-].*)?$
