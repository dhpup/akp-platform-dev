# One Argo CD Application per environment directory. Unlike the rendered
# variant, each Application syncs its Kustomize overlay directly from main —
# Kargo promotes by committing an image-tag bump to the overlay on main.
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: guestbook-kustomize
  namespace: argocd
spec:
  generators:
  - git:
      repoURL: https://github.com/example-org/akp-platform.git
      revision: HEAD
      directories:
      - path: apps/guestbook-kustomize/env/*
  template:
    metadata:
      name: guestbook-kustomize-{{path.basename}}
      annotations:
        # Authorizes the matching Kargo Stage to manage/sync this Application.
        kargo.akuity.io/authorized-stage: guestbook-kustomize:{{path.basename}}
    spec:
      project: guestbook-kustomize
      source:
        repoURL: https://github.com/example-org/akp-platform.git
        targetRevision: HEAD
        path: '{{path}}'
      destination:
        # The Argo CD cluster name of your workload cluster:
        name: workload-cluster
        # ...or specify a server address instead:
        # server: https://REPLACEME
