apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
- ../../base

namespace: guestbook-kustomize-prod

# Kargo's kustomize-set-image step updates newTag here on every promotion —
# this file IS the record of what runs in this environment.
images:
- name: ghcr.io/akuity/guestbook
  newTag: latest
