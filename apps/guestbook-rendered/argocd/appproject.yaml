# Convention: the AppProject name matches the app directory name and the
# Kargo Project name. Deliberately permissive for quickstart purposes —
# scope sourceRepos/destinations down before production use.
apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: guestbook-rendered
  namespace: argocd
spec:
  description: Guestbook promoted via the rendered-manifests (hydrated branch) pattern with Kustomize
  sourceRepos:
    - '*'
  destinations:
    - server: '*'
      name: '*'
      namespace: '*'
  clusterResourceWhitelist:
    - group: '*'
      kind: '*'
