# One Argo CD Application per environment directory. Each Application tracks
# the RENDERED branch env/guestbook-rendered/<stage> — not main. Kargo creates
# and updates those branches on promotion, then triggers a sync (argocd-update).
#
# NOTE: until the first promotion of a stage, its branch does not exist and the
# Application reports a comparison error. That is expected — promote freight in
# the Kargo UI and it resolves itself.
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: guestbook-rendered
  namespace: argocd
spec:
  generators:
  - git:
      repoURL: https://github.com/example-org/akp-platform.git
      revision: HEAD
      directories:
      - path: apps/guestbook-rendered/env/*
  template:
    metadata:
      name: guestbook-rendered-{{path.basename}}
      annotations:
        # Authorizes the matching Kargo Stage to manage/sync this Application.
        kargo.akuity.io/authorized-stage: guestbook-rendered:{{path.basename}}
    spec:
      project: guestbook-rendered
      source:
        repoURL: https://github.com/example-org/akp-platform.git
        # The hydrated branch written by the Kargo promotion task.
        targetRevision: env/guestbook-rendered/{{path.basename}}
        path: ./
      destination:
        # The Argo CD cluster name of your workload cluster:
        name: workload-cluster
        # ...or specify a server address instead:
        # server: https://REPLACEME
