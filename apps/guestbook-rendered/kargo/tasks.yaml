# The "rendered manifests" (hydrated branch) promotion pattern:
# main holds the Kustomize sources; every promotion renders the env overlay
# and force-pushes the plain YAML output to env/guestbook-rendered/<stage>.
# Argo CD Applications track those branches, so what is running in a cluster
# is always reviewable as plain manifests — no tooling required.
apiVersion: kargo.akuity.io/v1alpha1
kind: PromotionTask
metadata:
  name: promote
  namespace: guestbook-rendered
spec:
  vars:
  - name: repoURL
    value: https://github.com/dhpup/akp-platform.git
  - name: image
    value: ghcr.io/akuity/guestbook
  steps:
  # Clone the sources (at the exact commit from the Freight) to ./src and the
  # rendered output branch to ./out, creating the branch if needed.
  - uses: git-clone
    config:
      repoURL: ${{ vars.repoURL }}
      checkout:
      - commit: ${{ commitFrom(vars.repoURL).ID }}
        path: ./src
      - branch: env/guestbook-rendered/${{ ctx.stage }}
        path: ./out
        create: true
  # Start from a clean slate so the branch only ever contains freshly
  # rendered output.
  - uses: git-clear
    config:
      path: ./out
  # Pin the image tag from the Freight into the env overlay.
  - uses: kustomize-set-image
    as: update-image
    config:
      path: ./src/apps/guestbook-rendered/env/${{ ctx.stage }}
      images:
      - image: ${{ vars.image }}
        tag: ${{ imageFrom(vars.image).Tag }}
  # Render the overlay to plain YAML in ./out.
  - uses: kustomize-build
    config:
      path: ./src/apps/guestbook-rendered/env/${{ ctx.stage }}
      outPath: ./out
  - uses: git-commit
    as: commit
    config:
      path: ./out
      message: ${{ task.outputs['update-image'].commitMessage }}
  - uses: git-push
    config:
      path: ./out
  # Point the Argo CD Application at the new commit and sync it.
  - uses: argocd-update
    config:
      apps:
      - name: guestbook-rendered-${{ ctx.stage }}
        sources:
        - repoURL: ${{ vars.repoURL }}
          desiredRevision: ${{ task.outputs['commit'].commit }}
