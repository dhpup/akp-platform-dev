apiVersion: kargo.akuity.io/v1alpha1
kind: Warehouse
metadata:
  name: guestbook
  namespace: guestbook-rendered
spec:
  subscriptions:
  # New semver tags of the (public) guestbook image produce new Freight.
  - image:
      repoURL: ghcr.io/akuity/guestbook
      imageSelectionStrategy: SemVer
      allowTags: ^v?[0-9]+\.[0-9]+\.[0-9]+([\+-].*)?$
  # Changes to this app's manifests on main also produce new Freight.
  # Scoped with includePaths so promotions (which push to env/* branches)
  # and other apps' changes never trigger this warehouse.
  - git:
      repoURL: https://github.com/dhpup/akp-platform.git
      branch: main
      includePaths:
      - apps/guestbook-rendered
