# Sample verification gate used by the staging Stage. It queries GitHub's
# public status API and passes while GitHub reports no incident — a stand-in
# that is reliable, credential-free, and self-explanatory. Replace with real
# checks (Prometheus metrics, Jobs running integration tests, etc.).
apiVersion: argoproj.io/v1alpha1
kind: AnalysisTemplate
metadata:
  name: github-status
  namespace: guestbook-rendered
spec:
  metrics:
  - name: github-status
    interval: 10s
    count: 3
    failureLimit: 1
    successCondition: result == 'none'
    provider:
      web:
        url: https://www.githubstatus.com/api/v2/status.json
        jsonPath: "{$.status.indicator}"
