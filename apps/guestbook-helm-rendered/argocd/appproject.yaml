# Convention: the AppProject name matches the app directory name and the
# Kargo Project name. Deliberately permissive for quickstart purposes —
# scope sourceRepos/destinations down before production use.
apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: guestbook-helm-rendered
  namespace: argocd
spec:
  description: Guestbook rendered from a Helm chart into hydrated branches by Kargo
  sourceRepos:
    - '*'
  destinations:
    - server: '*'
      name: '*'
      namespace: '*'
  clusterResourceWhitelist:
    - group: '*'
      kind: '*'
