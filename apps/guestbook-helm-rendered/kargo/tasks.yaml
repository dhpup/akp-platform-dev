# The "rendered manifests" (hydrated branch) promotion pattern with Helm:
# main holds the chart and per-env values; every promotion runs helm-template
# and force-pushes the plain YAML output to env/guestbook-helm-rendered/<stage>.
# Argo CD Applications track those branches and never render the chart
# themselves — this is the same primitive behind PR-preview environments and
# templated golden paths.
apiVersion: kargo.akuity.io/v1alpha1
kind: PromotionTask
metadata:
  name: promote
  namespace: guestbook-helm-rendered
spec:
  vars:
  - name: repoURL
    value: https://github.com/example-org/akp-platform.git
  - name: image
    value: ghcr.io/akuity/guestbook
  steps:
  # Clone the sources (at the exact commit from the Freight) to ./src and the
  # rendered output branch to ./out, creating the branch if needed.
  - uses: git-clone
    config:
      repoURL: ${{ vars.repoURL }}
      checkout:
      - commit: ${{ commitFrom(vars.repoURL).ID }}
        path: ./src
      - branch: env/guestbook-helm-rendered/${{ ctx.stage }}
        path: ./out
        create: true
  # Start from a clean slate so the branch only ever contains freshly
  # rendered output.
  - uses: git-clear
    config:
      path: ./out
  # Render the chart with the stage's values file, pinning the image tag
  # from the Freight via setValues (which overrides any tag in values files).
  - uses: helm-template
    config:
      releaseName: guestbook
      path: ./src/apps/guestbook-helm-rendered/chart
      valuesFiles:
      - ./src/apps/guestbook-helm-rendered/env/${{ ctx.stage }}/values.yaml
      namespace: guestbook-helm-rendered-${{ ctx.stage }}
      setValues:
      - key: image.tag
        value: ${{ imageFrom(vars.image).Tag }}
      outPath: ./out/manifests.yaml
  - uses: git-commit
    as: commit
    config:
      path: ./out
      message: "guestbook-helm-rendered/${{ ctx.stage }}: render ${{ imageFrom(vars.image).Tag }}"
  - uses: git-push
    config:
      path: ./out
  # Point the Argo CD Application at the new commit and sync it.
  - uses: argocd-update
    config:
      apps:
      - name: guestbook-helm-rendered-${{ ctx.stage }}
        sources:
        - repoURL: ${{ vars.repoURL }}
          desiredRevision: ${{ task.outputs['commit'].commit }}
