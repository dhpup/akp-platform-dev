# Chart defaults. Per-environment values live in ../env/<stage>/values.yaml
# and are layered on top by Kargo's helm-template promotion step. image.tag is
# always overridden at promotion time from the Freight (setValues).
replicaCount: 1

image:
  repository: ghcr.io/akuity/guestbook
  tag: latest

service:
  port: 80
