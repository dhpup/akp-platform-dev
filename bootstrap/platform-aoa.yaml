# Root app-of-apps. Apply this ONCE against the Argo CD control plane
# (`argocd app create -f bootstrap/platform-aoa.yaml` or kubectl apply) and
# everything else in this repo — every app's Argo CD and Kargo resources —
# is discovered and deployed automatically by the ApplicationSets in this
# directory. Onboarding a new app never requires touching bootstrap/ again.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: platform-aoa
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/example-org/akp-platform-dev.git
    targetRevision: HEAD
    path: bootstrap
  destination:
    name: in-cluster
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
