# Discovers apps/*/argocd/ and creates one Argo CD Application per app that
# syncs that app's AppProject and ApplicationSets to the Argo CD control plane.
# Adding a new app directory under apps/ is all that's needed — no edits here.
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: argocd-apps
  namespace: argocd
spec:
  generators:
  - git:
      repoURL: https://github.com/example-org/akp-platform.git
      revision: HEAD
      directories:
      - path: apps/*/argocd
  template:
    metadata:
      name: 'argocd-{{path[1]}}'
    spec:
      # Uses the default project to avoid a bootstrap chicken-and-egg: each
      # app's AppProject lives inside the argocd/ path this Application syncs,
      # so the project can't exist before the Application is created.
      project: default
      source:
        repoURL: https://github.com/example-org/akp-platform.git
        targetRevision: HEAD
        path: '{{path}}'
        directory:
          recurse: true
      destination:
        name: in-cluster
        namespace: argocd
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
