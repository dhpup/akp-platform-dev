# Discovers apps/*/kargo/ and creates one Argo CD Application per app that
# syncs that app's Kargo resources (Project, Warehouse, Stages, PromotionTasks,
# AnalysisTemplates) to the Kargo control plane (Argo CD cluster named `kargo`).
#
# NOTE: automated sync is REQUIRED here. Without it, merged changes to
# apps/*/kargo/*.yaml silently never reach the cluster, and promotions keep
# running the stale task.
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: kargo-apps
  namespace: argocd
spec:
  generators:
  - git:
      repoURL: https://github.com/dhpup/akp-platform.git
      revision: HEAD
      directories:
      - path: apps/*/kargo
      # On the very first bootstrap, these Applications can be generated
      # before their AppProjects exist (the argocd-apps ApplicationSet
      # creates those asynchronously). That's harmless — but requeue
      # quickly so the retry happens in seconds, not minutes.
      requeueAfterSeconds: 30
  template:
    metadata:
      name: 'kargo-{{path[1]}}'
    spec:
      # Convention: the app directory name IS the Argo CD AppProject name and
      # the Kargo Project name. The AppProject is created by the argocd-apps
      # ApplicationSet above; this Application retries until it exists.
      project: '{{path[1]}}'
      source:
        repoURL: https://github.com/dhpup/akp-platform.git
        targetRevision: HEAD
        path: '{{path}}'
        directory:
          recurse: true
      destination:
        name: kargo
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
        - CreateNamespace=true
