# Rotate a secret: generate a new value server-side (AWS get-random-password, so
# no value is ever created on disk or in git) and put-secret-value. Outputs the
# new versionId for a downstream verify step. Credentials are passed as config
# from a shared secret and injected as env — never hardcoded.
apiVersion: ee.kargo.akuity.io/v1alpha1
kind: CustomPromotionStep
metadata:
  name: aws-secret-rotate
spec:
  image: amazon/aws-cli:2.17.0
  env:
  - name: AWS_ACCESS_KEY_ID
    value: ${{ config.accessKeyId }}
  - name: AWS_SECRET_ACCESS_KEY
    value: ${{ config.secretAccessKey }}
  - name: AWS_DEFAULT_REGION
    value: ${{ config.region }}
  - name: SECRET_ID
    value: ${{ config.secretId }}
  command:
  - sh
  - -c
  - |
    set -eu
    NEW=$(aws secretsmanager get-random-password --password-length 32 \
      --exclude-punctuation --query RandomPassword --output text)
    VID=$(aws secretsmanager put-secret-value \
      --secret-id "$SECRET_ID" --secret-string "$NEW" \
      --query VersionId --output text)
    echo "rotated $SECRET_ID -> version $VID"
    echo "versionId=$VID" > "$KARGO_OUTPUT"
  output:
    source:
      type: Pipe
      format: KeyValue
  defaultTimeout: 5m
  defaultErrorThreshold: 3
