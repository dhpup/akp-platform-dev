# Read-back gate: assert the live AWSCURRENT version of the secret matches the
# version a preceding rotate step produced. Fails the promotion if the new
# version is not actually live, so a stage is never "healthy" on a silent no-op.
apiVersion: ee.kargo.akuity.io/v1alpha1
kind: CustomPromotionStep
metadata:
  name: aws-secret-verify
spec:
  image: amazon/aws-cli:2.17.0
  env:
  - name: AWS_ACCESS_KEY_ID
    value: ${{ config.accessKeyId }}
  - name: AWS_SECRET_ACCESS_KEY
    value: ${{ config.secretAccessKey }}
  - name: AWS_DEFAULT_REGION
    value: ${{ config.region }}
  - name: SECRET_ID
    value: ${{ config.secretId }}
  - name: EXPECT_VERSION
    value: ${{ config.expectedVersionId }}
  command:
  - sh
  - -c
  - |
    set -eu
    CUR=$(aws secretsmanager get-secret-value \
      --secret-id "$SECRET_ID" --version-stage AWSCURRENT \
      --query VersionId --output text)
    echo "AWSCURRENT version: $CUR (expected $EXPECT_VERSION)"
    [ "$CUR" = "$EXPECT_VERSION" ]
  defaultTimeout: 3m
  defaultErrorThreshold: 3
