      name: es-desired-state
    sources:
      direct: true
  promotionTemplate:
    spec:
      steps:
      - task:
          name: scale-up
          vars:
          - name: esEndpoint
            value: https://es-prod-b.internal:9200
          - name: desiredNodes
            value: "6"
          - name: esUser
            value: ${% sharedSecret('es-credentials-prod-b').username %}
          - name: esPass
            value: ${% sharedSecret('es-credentials-prod-b').password %}
          - name: awsAccessKeyId
            value: ${% sharedSecret('aws-tf-prod').accessKeyId %}
          - name: awsSecretAccessKey
            value: ${% sharedSecret('aws-tf-prod').secretAccessKey %}
