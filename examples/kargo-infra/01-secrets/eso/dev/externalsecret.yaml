# Option (b) sample: ExternalSecret reconciled by External Secrets Operator.
# Per-env differences (store name, AWS path) are what change across dev/staging/
# prod. No raw value here — ESO fetches it from the SecretStore.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: example-app-db-password
  namespace: example-app-dev
spec:
  refreshInterval: 1h
  secretStoreRef:
    # The SecretStore holds the scoped AWS credential — that is where AWS access
    # lives, not in Kargo. Defined once per cluster/namespace by the platform team.
    name: aws-secrets-manager-dev
    kind: SecretStore
  target:
    name: example-app-db-password
  data:
  - secretKey: password
    remoteRef:
      key: example-app/db-password
