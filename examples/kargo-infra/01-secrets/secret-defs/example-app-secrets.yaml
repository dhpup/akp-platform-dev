# Declarative secret DEFINITION — the source of truth the Warehouse watches.
# Holds names, metadata, and a REFERENCE to where the real value lives. It must
# NEVER contain a raw secret value. A commit here is what triggers a rotation.
secrets:
- name: example-app/db-password
  description: Database password for example-app
  # Which backing store + key holds the actual value. Option (a) reads this to
  # know what to PutSecretValue; option (b) turns it into an ExternalSecret.
  valueRef:
    store: aws-secrets-manager
    # The value itself is sourced out-of-band (e.g. generated by the rotation
    # runner, or already present in the store). This file only points at it.
    key: example-app/db-password
  # Bumping this is the human-legible "please rotate" signal captured in git.
  rotationSerial: 1
